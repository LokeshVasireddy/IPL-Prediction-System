version: "3.9"

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - ml-service
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    volumes:
      # mount model instead of baking into image
      - ./models:/app/models
    environment:
      - ENV=production
    restart: unless-stopped

  mongo:
    image: mongo:6-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

# named volume (persistent but controlled)
volumes:
  mongo_data: